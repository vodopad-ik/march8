<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Поздравлений</title>
    <style>
        body {
            font-family: sans-serif;
            background: #fff5f8;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #d81b60;
            font-size: 20px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .result {
            margin-top: 25px;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            font-size: 13px;
            border: 1px dashed #ccc;
        }

        button {
            background: #ff8fb1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #f06292;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎁 Генератор ссылок для открыток</h1>

        <label>Базовая ссылка на твой сайт:</label>
        <input type="text" id="baseUrl" value="https://vodopad-ik.github.io/march8/"
            placeholder="Вставь ссылку на GitHub Pages">

        <label>Юзернейм бота (без @):</label>
        <input type="text" id="botUsername" placeholder="Например: my_march8_bot">

        <label>Короткое имя Web App (из BotFather):</label>
        <input type="text" id="appShortName" placeholder="Например: congrats">

        <label>Имя девушки:</label>
        <input type="text" id="name" placeholder="Например: Катя">

        <label>Текст поздравления:</label>
        <textarea id="text" rows="3" placeholder="Оставь пустым, чтобы был стандартный текст"></textarea>

        <label>Имя файла фото (в папке /photos):</label>
        <input type="text" id="photo" placeholder="Например: kate.jpg">

        <button onclick="generateLink()">Сгенерировать ссылки</button>

        <div class="result" id="resultContainer" style="display:none;">
            <strong>1. Прямая ссылка (для браузера):</strong>
            <div id="finalLink" style="margin-top:10px; color: #d81b60; font-size: 11px;"></div>

            <strong style="display:block; margin-top:15px;">2. Telegram Web App ссылка (нативное окно):</strong>
            <div id="tgLink" style="margin-top:10px; color: #0088cc; font-size: 11px; font-weight: bold;"></div>

            <button onclick="copyTgLink()" style="margin-top:15px; background: #0088cc;">Копировать Telegram
                ссылку</button>
            <button onclick="copyLink()"
                style="margin-top:10px; font-size: 12px; padding: 8px; background: #eee; color: #333;">Копировать прямую
                ссылку</button>
        </div>
    </div>

    <script>
        function generateLink() {
            let base = document.getElementById('baseUrl').value.trim();
            if (!base.endsWith('/')) base += '/';

            const botUsername = document.getElementById('botUsername').value.trim();
            const appShortName = document.getElementById('appShortName').value.trim();
            const name = document.getElementById('name').value.trim();
            const text = document.getElementById('text').value.trim();
            const photo = document.getElementById('photo').value.trim();

            // 1. Прямая ссылка
            const url = new URL(base);
            if (name) url.searchParams.set('name', name);
            if (text) url.searchParams.set('text', text);
            if (photo) url.searchParams.set('photo', photo);
            const finalUrl = `${url.origin}${url.pathname}index.html?${url.searchParams.toString()}`;

            // 2. Telegram ссылка
            let tgUrl = "Заполни юзернейм бота и имя приложения";
            if (botUsername && appShortName) {
                let startAppParams = [];
                if (name) startAppParams.push(`name_${encodeURIComponent(name)}`);
                if (text) startAppParams.push(`text_${encodeURIComponent(text)}`);
                if (photo) startAppParams.push(`photo_${encodeURIComponent(photo)}`);

                const startParam = startAppParams.join('-');
                tgUrl = `https://t.me/${botUsername}/${appShortName}${startParam ? '?startapp=' + startParam : ''}`;
            }

            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('finalLink').innerText = finalUrl;
            document.getElementById('tgLink').innerText = tgUrl;
        }

        function copyLink() {
            const link = document.getElementById('finalLink').innerText;
            navigator.clipboard.writeText(link);
            alert('Прямая ссылка скопирована!');
        }

        function copyTgLink() {
            const link = document.getElementById('tgLink').innerText;
            navigator.clipboard.writeText(link);
            alert('Telegram ссылка скопирована!');
        }
    </script>
</body>

</html>
